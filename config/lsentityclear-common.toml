[spawning]
	#Global interval (in ticks) to allow natural spawn attempts.
	#1 = vanilla behavior (attempt each tick),
	#>1 = only every Nth tick will process NaturalSpawner.spawnForChunk.
	#Range: 1 ~ 6000
	attemptIntervalTicks = 1
	#Enable debug logging for spawn throttling (NaturalSpawner)
	debugThrottle = false

